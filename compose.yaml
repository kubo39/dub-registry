services:
  server:
    image: dlang-community/dub-registry
    build:
      context: .
    depends_on:
      - mongo
    environment:
      - DUB_REGISTRY_HOME
      - MONGODB_URI=mongodb://root:example@mongo:27017/vpmreg?authSource=admin
    ports:
      - "9095:9095"
    volumes:
      - "${DUB_REGISTRY_HOME}:/dub"
  mongo:
    image: mongo:8.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - "${DUB_REGISTRY_HOME}/db:/data/db"
      - "${DUB_REGISTRY_HOME}/configdb:/data/configdb"
